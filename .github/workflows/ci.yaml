name: CI

# Trigger conditions
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Permissions needed for the workflow
# `contents: read` - clone the repo
# `packages: write` - push images to ghcr.io
permissions:
  contents: read
  packages: write

# Environment variables available to all jobs
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Job 1: Run Python tests
  test:
    name: Test Flask app
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12" # matches our Dockerfile

      - name: Install dependencies
        working-directory: ./app
        run: pip install -r requirements.txt

      - name: Run pytest
        working-directory: ./app
        run: pytest -v

  # Job 2: Lint and validate the Helm chart
  helm-validate:
    name: Validate Helm chart
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint Helm chart
        run: helm lint helm/hello-world

      - name: Template Helm chart
        run: helm template test-release helm/hello-world

  # Job 3: Build and push Docker image
  # Depends on `test` and `helm-validate` - runs only if both pass
  build-and-push:
    name: Build and push image
    runs-on: ubuntu-latest
    needs: [test, helm-validate]
    # Only push on pushes to main, not on PRs (which come from forks without write access)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max